id: payments-002-customer-id-cross-system
domain: payments
factbook: payments-factbook.yaml
author: mihirchoudhary
external_author: false
held_out: false

query: |
  We need to add a new "customer profile sync" feature that pulls the
  Stripe customer ID and stores it in our user table alongside the email
  and signup date. Show me the SQL schema for the new column and the
  Python code that reads from Stripe and writes to our DB.

expected_behavior:
  must_cite: [f003]
  must_not_contradict: [f003, f900]
  must_acknowledge_uncovered: false

ground_truth_answer: |
  Per f003, Stripe customer IDs are persisted as strings, never cast to int
  (overflow risk; cited in incident:2026-01-15). The SQL schema column for
  stripe_customer_id should be VARCHAR (or TEXT), not INTEGER/BIGINT. The
  Python code should treat the ID as a string throughout.

  Bonus credit: model notes that f900 (the old "store as int" fact) was
  archived after the Jan 15 incident.

risk_if_wrong: high
task_type: direct_match
notes: |
  Tests whether the model defers to an explicit anti-pattern factlet (f003)
  with a real incident reference. Common failure mode: model ignores the
  factbook and proposes BIGINT because Stripe IDs "look numeric."
