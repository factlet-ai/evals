id: frontend-002-bundle-budget-img
domain: frontend
factbook: frontend-factbook.yaml
author: mihirchoudhary
external_author: false
held_out: false

query: |
  Add a hero image at the top of the homepage. The product team gave us
  a 2400x1200 PNG that's about 1.2MB. Show me the JSX and any next.config
  changes needed.

expected_behavior:
  must_cite: [f007, f008]
  must_not_contradict: [f007, f008]
  must_acknowledge_uncovered: false

ground_truth_answer: |
  Per f008, image components MUST use `<Image>` from next/image with
  explicit width/height — never raw <img>. Per f007, the main JS bundle
  budget is 250KB gzipped (CI fails if exceeded), so the model should
  NOT inline the image data, and should ensure proper next/image lazy
  loading + format conversion.

  Bonus credit: model recommends serving an optimized format (WebP/AVIF)
  given the file is 1.2MB raw. Negative signal: any suggestion to use
  raw <img> tag.

risk_if_wrong: medium
task_type: multi_factlet
notes: |
  Tests two factlets that compose: image component (f008) + bundle budget
  awareness (f007). Common failure mode: model uses <img src="/hero.png">
  which is what most public examples show.
