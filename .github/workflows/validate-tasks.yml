name: validate-tasks

on:
  pull_request:
    branches: [main]
    paths:
      - 'tier1/tasks/**'
      - 'tier1/factbooks/**'
      - 'runner/validate.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pyyaml
      - name: Validate task YAML files
        run: python3 runner/validate.py --tasks tier1/tasks --factbooks tier1/factbooks
